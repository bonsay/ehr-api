spring:
  application:
    name: ehr-api

  # Default datasource targets the shared Oracle instance (same host/config as
  # content-retrieval-api). For local development without Oracle, run with the
  # "h2" profile:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
  datasource:
    url: jdbc:oracle:thin:@therapyapp.internal:1521:XE
    driver-class-name: oracle.jdbc.OracleDriver
    username: SYSTEM
    password: Ves$4per

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded
      data-locations: classpath:data.sql

  # OAuth2 / OIDC resource server. Point this at your IdP (Keycloak, Entra ID,
  # Auth0, Cognito, ...). The server validates inbound JWT access tokens against
  # the issuer's JWKS. Required whenever ehr.security.enabled is true.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI:}

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    com.ehrapi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# EHR platform security settings.
ehr:
  security:
    # Authentication / authorization mode:
    #   oidc  - resource server validating JWTs from an external IdP (default,
    #           higher environments). Roles come from the token.
    #   local - the API authenticates users itself (username/password) and issues
    #           its own JWTs. Self-contained; ideal for dev/demo. See below.
    #   open  - no authentication at all. LOCAL DEV ONLY.
    mode: ${EHR_SECURITY_MODE:oidc}
    # Seed demo users (admin/physician/nurse/reception) on startup. Default off;
    # the h2 dev profile turns this on so the role model is demonstrable.
    seed-demo-users: ${EHR_SEED_DEMO_USERS:false}
    local:
      # HS256 signing secret for local-mode tokens. MUST be overridden (>= 32
      # bytes) in any shared environment.
      jwt-secret: ${EHR_LOCAL_JWT_SECRET:dev-local-secret-change-me-please-32b+}
      # Access-token lifetime in seconds (default 8h).
      token-ttl-seconds: ${EHR_LOCAL_TOKEN_TTL:28800}
  auth:
    # JWT claim that carries the caller's institution id. Configure to match the
    # claim your IdP issues (e.g. a Keycloak mapper / Entra app role claim).
    institution-claim: ${EHR_INSTITUTION_CLAIM:institution_id}
    # JWT claim carrying role codes (oidc mode); expanded to permissions via the
    # admin-editable role definitions.
    roles-claim: ${EHR_ROLES_CLAIM:roles}
    # Optional JWT claim carrying permission strings directly (oidc mode).
    authorities-claim: ${EHR_AUTHORITIES_CLAIM:authorities}
  cors:
    # Comma-separated allowed origins. Lock to your web app origin(s) in prod.
    allowed-origins: ${EHR_CORS_ORIGINS:http://localhost:4200}
  billing:
    # Billing provider for paid-module purchases:
    #   local  - self-contained; "buy" grants the entitlement immediately. No
    #            payment gateway. Default; ideal for dev/demo.
    #   stripe - real Stripe Checkout; entitlements are granted on a signed
    #            webhook. Requires the keys below and per-module price ids.
    mode: ${EHR_BILLING_MODE:local}
    # Where Stripe redirects the buyer after checkout (back to the marketplace).
    success-url: ${EHR_BILLING_SUCCESS_URL:http://localhost:4200/marketplace}
    cancel-url: ${EHR_BILLING_CANCEL_URL:http://localhost:4200/marketplace}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

---
# Local development profile backed by in-memory H2. Security is OPEN here so the
# app runs without an IdP; never use this profile in a higher environment.
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:ehrdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

ehr:
  security:
    # Local mode: the API authenticates users and issues its own JWTs, so the
    # full role-based authorization story is demonstrable without an external
    # IdP. Set EHR_SECURITY_MODE=open to disable auth entirely.
    mode: ${EHR_SECURITY_MODE:local}
    seed-demo-users: true
  cors:
    allowed-origins: "*"
