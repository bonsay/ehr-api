spring:
  application:
    name: ehr-api

  # Default datasource targets the shared Oracle instance (same host/config as
  # content-retrieval-api). For local development without Oracle, run with the
  # "h2" profile:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
  datasource:
    url: jdbc:oracle:thin:@therapyapp.internal:1521:XE
    driver-class-name: oracle.jdbc.OracleDriver
    username: SYSTEM
    password: Ves$4per

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded
      data-locations: classpath:data.sql

  # OAuth2 / OIDC resource server. Point this at your IdP (Keycloak, Entra ID,
  # Auth0, Cognito, ...). The server validates inbound JWT access tokens against
  # the issuer's JWKS. Required whenever ehr.security.enabled is true.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI:}

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    com.ehrapi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# EHR platform security settings.
ehr:
  security:
    # When true (default / higher environments) every endpoint requires a valid
    # JWT. Set false only for local development against an open backend.
    enabled: ${EHR_SECURITY_ENABLED:true}
  auth:
    # JWT claim that carries the caller's institution id. Configure to match the
    # claim your IdP issues (e.g. a Keycloak mapper / Entra app role claim).
    institution-claim: ${EHR_INSTITUTION_CLAIM:institution_id}
  cors:
    # Comma-separated allowed origins. Lock to your web app origin(s) in prod.
    allowed-origins: ${EHR_CORS_ORIGINS:http://localhost:4200}

---
# Local development profile backed by in-memory H2. Security is OPEN here so the
# app runs without an IdP; never use this profile in a higher environment.
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:ehrdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

ehr:
  security:
    enabled: false
  cors:
    allowed-origins: "*"
